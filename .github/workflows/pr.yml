name: PR Quality Gates

on:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff (lint)
        run: |
          ruff check .

      - name: Mypy (type check)
        run: |
          mypy app

      - name: Unit tests
        run: |
          pytest

      - name: Alembic scripts sanity
        run: |
          python -m compileall alembic
          alembic -c alembic.ini heads

  llm-determinism:
    # Secrets are not available to forked PRs.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: LLM determinism checks
        env:
          AI_AGENTIC_API_KEY: ${{ secrets.AI_AGENTIC_API_KEY }}
          RUN_LLM_TESTS: "1"
        run: |
          pytest -m llm
