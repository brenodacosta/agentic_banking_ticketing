version: 0.0
os: linux
files:
  - source: /
    destination: /opt/agentic_banking_ticketing

permissions:
  - object: /opt/agentic_banking_ticketing/scripts
    pattern: "**"
    owner: root
    group: root
    mode: 755

hooks:
  BeforeInstall:
    - location: scripts/stop.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/start.sh
      timeout: 900
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 120
      runas: root
