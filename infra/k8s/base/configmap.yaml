apiVersion: v1
kind: ConfigMap
metadata:
  name: genai-platform-config
  namespace: genai-platform
data:
  APP_ENV: "prod"
  GENAI_MODEL: "gemini-3-flash-preview"
  LLM_TEMPERATURE: "0"
  LOG_LEVEL: "INFO"

  # Placeholder for Phase 4. App doesn't use DB yet, but this keeps the boundary ready.
  DATABASE_URL: "postgresql://postgres@postgres:5432/genai"
